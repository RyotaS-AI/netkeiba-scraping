name: 競馬スクレイピング

on:
  workflow_dispatch:
    inputs:
      race_id:
        description: "対象レースのrace_id（12桁）。空欄の場合はrace_ids.txtを使用"
        required: false
        type: string
  schedule:
    # テスト用: 20:40 JST (11:40 UTC) ※テスト後に元に戻すこと
    - cron: '40 11 * * *'

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 依存パッケージをインストール
        run: pip install -r requirements.txt

      - name: スクレイピングを実行
        env:
          NETKEIBA_LOGIN_ID: ${{ secrets.NETKEIBA_LOGIN_ID }}
          NETKEIBA_PASSWORD: ${{ secrets.NETKEIBA_PASSWORD }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: |
          if [ -n "${{ github.event.inputs.race_id }}" ]; then
            # 手動実行でrace_idが指定された場合
            python main.py "${{ github.event.inputs.race_id }}"
          else
            # race_ids.txtから読み込んで順番に実行
            while IFS= read -r race_id || [ -n "$race_id" ]; do
              race_id=$(echo "$race_id" | tr -d '[:space:]')
              [ -z "$race_id" ] && continue
              [[ "$race_id" == \#* ]] && continue
              echo "=== race_id: $race_id を実行中 ==="
              python main.py "$race_id"
            done < race_ids.txt
          fi
