name: 競馬スクレイピング

on:
  workflow_dispatch:
    inputs:
      race_id:
        description: "対象レースのrace_id（12桁）"
        required: true
        type: string
  schedule:
    # テスト用: UTC 11:55 (JST 20:55) ※テスト後に元に戻すこと
    - cron: '55 11 * * *'

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 依存パッケージをインストール
        run: pip install -r requirements.txt

      - name: スクレイピングを実行
        env:
          NETKEIBA_LOGIN_ID: ${{ secrets.NETKEIBA_LOGIN_ID }}
          NETKEIBA_PASSWORD: ${{ secrets.NETKEIBA_PASSWORD }}
          GOOGLE_OAUTH_CLIENT_ID: ${{ secrets.GOOGLE_OAUTH_CLIENT_ID }}
          GOOGLE_OAUTH_CLIENT_SECRET: ${{ secrets.GOOGLE_OAUTH_CLIENT_SECRET }}
          GOOGLE_OAUTH_REFRESH_TOKEN: ${{ secrets.GOOGLE_OAUTH_REFRESH_TOKEN }}
          GOOGLE_DRIVE_FOLDER_ID: ${{ secrets.GOOGLE_DRIVE_FOLDER_ID }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            python main.py "${{ github.event.inputs.race_id }}"
          else
            python run_scheduled.py
          fi
